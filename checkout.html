
<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
font-family:Poppins;
background:#f8f8f8;
text-align:center;
}

.box{
background:white;
padding:20px;
margin:50px auto;
width:300px;
border-radius:10px;
}

button{
padding:10px 15px;
background:violet;
color:white;

}

</head>

<body>

<div class="box">

<h2>Checkout Page</h2>

<p>Order your product</p>

<button onclick="place()">Place Order</button>

</div>

<script>

function place(){

alert("Order placed successfully");

window.location.href="orders.html";

}

</script>

</body>
</html>
