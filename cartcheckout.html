<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store - Checkout</title>
<style>
body {margin:0; font-family:'Poppins',sans-serif; background:#f8f8f8;}
header.navbar {display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:linear-gradient(135deg,violet,skyblue); color:white;}
header .logo {font-size:24px; font-weight:bold; cursor:pointer;}
header .nav-icons span {margin-left:20px; cursor:pointer;}
main {padding:20px; max-width:600px; margin:auto; background:white; border-radius:15px; box-shadow:0 3px 10px rgba(0,0,0,0.1);}
h2 {margin-top:0;}
.product-summary {display:flex; align-items:center; gap:20px; margin-bottom:20px;}
.product-summary img {width:150px; border-radius:10px;}
.product-summary div {flex:1;}
input[type=number] {width:60px; padding:5px; margin-top:5px;}
button {padding:10px 15px; border:none; border-radius:5px; background:violet; color:white; cursor:pointer; transition:0.3s;}
button:hover {opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
  <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
  <div class="nav-icons">
    <span onclick="redirect('cart.html')">🛒 Cart</span>
    <span onclick="redirect('profile.html')">👤 Profile</span>
  </div>
</header>

<main>
  <h2>Checkout</h2>
  <div id="checkoutContainer">
    <!-- Product summary will load here -->
  </div>
  <button id="placeOrderBtn">Place Order</button>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Products Data (same as product.html) =====
const products = [
  {id:1,name:"Product A",price:499,image:"https://via.placeholder.com/300x300?text=A"},
  {id:2,name:"Product B",price:799,image:"https://via.placeholder.com/300x300?text=B"},
  {id:3,name:"Product C",price:299,image:"https://via.placeholder.com/300x300?text=C"},
  {id:4,name:"Product D",price:999,image:"https://via.placeholder.com/300x300?text=D"}
];

// ===== Logged-in user =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ alert("Please login first."); redirect("index.html"); }

// ===== Selected product =====
const selectedId = parseInt(localStorage.getItem("checkoutProduct"));
const product = products.find(p=>p.id===selectedId);
const container = document.getElementById("checkoutContainer");

if(!product){
  container.innerHTML="<p>No product selected!</p>";
}else{
  container.innerHTML = `
    <div class="product-summary">
      <img src="${product.image}" alt="${product.name}">
      <div>
        <h3>${product.name}</h3>
        <p>Price: ₹${product.price}</p>
        <label>Quantity: <input type="number" id="quantity" value="1" min="1"></label>
        <p id="totalPrice"><strong>Total: ₹${product.price}</strong></p>
      </div>
    </div>
  `;
}

// ===== Quantity update =====
const qtyInput = document.getElementById("quantity");
qtyInput.addEventListener("input", ()=>{
  const qty = parseInt(qtyInput.value) || 1;
  document.getElementById("totalPrice").innerHTML = `<strong>Total: ₹${product.price*qty}</strong>`;
});

// ===== Place Order =====
document.getElementById("placeOrderBtn").addEventListener("click", ()=>{
  const qty = parseInt(qtyInput.value) || 1;
  let orders = JSON.parse(localStorage.getItem("orders") || "[]");
  orders.push({
    username: loggedInUser,
    productId: product.id,
    productName: product.name,
    price: product.price,
    quantity: qty,
    date: new Date().toLocaleString()
  });
  localStorage.setItem("orders", JSON.stringify(orders));
  alert("Order placed successfully!");
  redirect("orders.html"); // redirect to My Orders page
});
</script>

</body>
</html>
