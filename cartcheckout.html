<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;max-width:600px;margin:auto;}
.checkout-item{display:flex;justify-content:space-between;padding:15px;background:white;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.checkout-item span{font-weight:bold;}
.total{margin-top:20px;font-size:20px;text-align:right;font-weight:bold;}
.pay-btn{margin-top:15px;padding:10px 20px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;font-size:16px;float:right;}
.pay-btn:hover{opacity:0.8;}
.user-info{margin-bottom:20px;padding:15px;background:white;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.user-info p{margin:5px 0;font-size:16px;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h2>Checkout</h2>

    <!-- User Info -->
    <div class="user-info" id="userInfo"></div>

    <!-- Cart Items -->
    <div id="checkoutContainer"></div>
    <div class="total" id="totalAmount"></div>
    <button class="pay-btn" onclick="payNow()">Pay Now</button>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){ 
    alert("Please login first."); 
    redirect("index.html"); 
}

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ===== Load Checkout Cart =====
let checkoutCart = JSON.parse(localStorage.getItem("checkoutCart") || "[]");
const container = document.getElementById("checkoutContainer");
const totalDiv = document.getElementById("totalAmount");
const userDiv = document.getElementById("userInfo");

// ===== Display Logged-in User Info =====
userDiv.innerHTML = `
    <p><strong>Name:</strong> ${loggedInUser.username}</p>
    <p><strong>Email:</strong> ${loggedInUser.email}</p>
    <p><strong>Mobile:</strong> ${loggedInUser.mobile}</p>
`;

// ===== Load Cart Items =====
function loadCheckout(){
    container.innerHTML = "";
    let total = 0;
    if(checkoutCart.length===0){
        container.innerHTML = "<p>No items to checkout!</p>";
        totalDiv.innerHTML = "";
        return;
    }
    checkoutCart.forEach(item=>{
        const product = products.find(p=>p.id===item.id);
        const itemTotal = product.price * item.quantity;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "checkout-item";
        div.innerHTML = `
            <span>${product.name} x ${item.quantity}</span>
            <span>₹${itemTotal}</span>
        `;
        container.appendChild(div);
    });
    totalDiv.innerHTML = `Total Amount: ₹${total}`;
}

// ===== Pay Now =====
function payNow(){
    if(checkoutCart.length===0){
        alert("Cart is empty!");
        redirect("cart.html");
        return;
    }

    alert("Payment Successful! Order placed.");

    // ===== Save order =====
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    const orderData = checkoutCart.map(item => ({
        ...item,
        date: new Date().toLocaleString(),
        user: loggedInUser.username
    }));
    orders.push(...orderData);
    localStorage.setItem("orders", JSON.stringify(orders));

    // ===== Clear cart =====
    localStorage.removeItem("cart");
    localStorage.removeItem("checkoutCart");

    redirect("orders.html");
}

// Initial load
loadCheckout();
</script>

</body>
</html>
