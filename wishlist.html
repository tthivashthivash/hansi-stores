<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMeesho Wishlist</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f8f8f8;
}

header.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,violet,skyblue);
color:white;
}

header .logo{
font-size:24px;
font-weight:bold;
cursor:pointer;
}

header .nav-icons span{
margin-left:20px;
cursor:pointer;
font-weight:bold;
}

main{
padding:20px;
max-width:900px;
margin:auto;
}

.wishlist-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.wishlist-item{
border:1px solid #ccc;
border-radius:10px;
width:200px;
text-align:center;
padding:10px;
background:white;
}

.wishlist-item img{
width:100%;
border-radius:10px;
}

.wishlist-item button{
padding:8px 12px;
margin-top:10px;
border:none;
border-radius:5px;
background:violet;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo" onclick="redirect('home.html')">
MiniMeesho
</div>

<div class="nav-icons">

<span onclick="redirect('home.html')">🏠 Home</span>
<span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
<span onclick="redirect('cart.html')">🛒 Cart</span>
<span onclick="redirect('profile.html')">👤 Profile</span>

</div>

</header>

<main>

<h1 style="text-align:center;">Your Wishlist</h1>

<div class="wishlist-container" id="wishlistContainer"></div>

</main>

<script>

function redirect(page){
window.location.href = page;
}

const products=[

{id:1,name:"Product A",price:499,image:"https://via.placeholder.com/200?text=A"},
{id:2,name:"Product B",price:799,image:"https://via.placeholder.com/200?text=B"},
{id:3,name:"Product C",price:299,image:"https://via.placeholder.com/200?text=C"},
{id:4,name:"Product D",price:999,image:"https://via.placeholder.com/200?text=D"}

];

// user
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){
alert("Login first");
redirect("index.html");
}

let username = user.username;

// wishlist data
let wishlistData = JSON.parse(localStorage.getItem("wishlist") || "{}");

if(!wishlistData[username]){
wishlistData[username] = [];
}

function saveWishlist(){
localStorage.setItem("wishlist",JSON.stringify(wishlistData));
}

// render
function renderWishlist(){

let container=document.getElementById("wishlistContainer");
container.innerHTML="";

let userWishlist = wishlistData[username];

if(userWishlist.length===0){
container.innerHTML="<h3>Your wishlist is empty</h3>";
return;
}

userWishlist.forEach(id=>{

let product = products.find(p=>p.id===id);

if(!product) return;

let div=document.createElement("div");

div.className="wishlist-item";

div.innerHTML=`

<img src="${product.image}">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<button onclick="removeItem(${id})">
Remove
</button>

`;

container.appendChild(div);

});

}

function removeItem(id){

wishlistData[username] = wishlistData[username].filter(pid=>pid!==id);

saveWishlist();

renderWishlist();

}

renderWishlist();

</script>

</body>
</html>
