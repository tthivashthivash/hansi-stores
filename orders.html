<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store - My Orders</title>
<style>
body {margin:0; font-family:'Poppins',sans-serif; background:#f8f8f8;}
header.navbar {display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:linear-gradient(135deg,violet,skyblue); color:white;}
header .logo {font-size:24px; font-weight:bold; cursor:pointer;}
header .nav-icons span {margin-left:20px; cursor:pointer;}
main {padding:20px; max-width:800px; margin:auto; background:white; border-radius:15px; box-shadow:0 3px 10px rgba(0,0,0,0.1);}
h2 {margin-top:0;}
.order-card {border:1px solid #ccc; border-radius:10px; padding:15px; margin-bottom:15px; background:#fafafa;}
.order-card h3 {margin:0 0 5px 0;}
.order-card p {margin:3px 0;}
</style>
</head>
<body>

<header class="navbar">
  <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
  <div class="nav-icons">
    <span onclick="redirect('cart.html')">🛒 Cart</span>
    <span onclick="redirect('profile.html')">👤 Profile</span>
  </div>
</header>

<main>
  <h2>My Orders</h2>
  <div id="ordersContainer">
    <!-- Orders will load here -->
  </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in User =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ alert("Please login first."); redirect("index.html"); }

// ===== Load Orders =====
const orders = JSON.parse(localStorage.getItem("orders") || "[]");
const userOrders = orders.filter(o=>o.username===loggedInUser);
const container = document.getElementById("ordersContainer");

if(userOrders.length===0){
  container.innerHTML = "<p>You have no orders yet.</p>";
}else{
  userOrders.forEach(o=>{
    const div = document.createElement("div");
    div.className = "order-card";
    div.innerHTML = `
      <h3>${o.productName}</h3>
      <p>Price: ₹${o.price}</p>
      <p>Quantity: ${o.quantity}</p>
      <p>Total: ₹${o.price*o.quantity}</p>
      <p>Order Date: ${o.date}</p>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
