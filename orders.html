<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;max-width:800px;margin:auto;}
.order-item{background:white;padding:15px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.order-item span{display:block;margin:5px 0;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h2>My Orders</h2>
    <div id="ordersContainer"></div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ 
    alert("Please login first."); 
    redirect("index.html"); 
}

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

let orders = JSON.parse(localStorage.getItem("orders") || "[]");
const container = document.getElementById("ordersContainer");

function loadOrders(){
    container.innerHTML = "";
    if(orders.length===0){
        container.innerHTML = "<p>No orders yet!</p>";
        return;
    }
    orders.forEach((item,i)=>{
        const product = products.find(p=>p.id===item.id);
        const div = document.createElement("div");
        div.className = "order-item";
        div.innerHTML = `
            <span><strong>Order #${i+1}</strong></span>
            <span>Product: ${product.name}</span>
            <span>Quantity: ${item.quantity}</span>
            <span>Price per unit: ₹${product.price}</span>
            <span>Total: ₹${product.price*item.quantity}</span>
            <span>Ordered on: ${item.date}</span>
        `;
        container.appendChild(div);
    });
}

loadOrders();
</script>

</body>
</html>
