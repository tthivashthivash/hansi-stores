<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>

<style>

body{
font-family:Poppins;
background:#f8f8f8;
margin:0;
}

h1{
text-align:center;
margin-top:20px;
}

.order{
background:white;
margin:20px auto;
padding:15px;
width:350px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>My Orders</h1>

<div id="orders"></div>

<script>

let orders=JSON.parse(localStorage.getItem("orders") || "[]");

const container=document.getElementById("orders");

if(orders.length===0){

container.innerHTML="<h3 style='text-align:center'>No Orders Yet</h3>";

}else{

orders.forEach(o=>{

let div=document.createElement("div");

div.className="order";

div.innerHTML=`

<h3>${o.name}</h3>

<p>Price : ₹${o.price}</p>

<p>Quantity : ${o.qty}</p>

<p>Total : ₹${o.total}</p>

`;

container.appendChild(div);

});

}

</script>

</body>
</html>
