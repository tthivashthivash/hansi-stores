<!DOCTYPE html>
<html>
<head>
<title>Orders</title>

<style>

body{
font-family:Poppins;
background:#f8f8f8;
}

h1{
text-align:center;
}

.order{
background:white;
margin:20px auto;
padding:15px;
width:350px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>My Orders</h1>

<div id="orders"></div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

const container=document.getElementById("orders");

if(orders.length==0){

container.innerHTML="<h3 style='text-align:center'>No orders</h3>";

}

orders.forEach(o=>{

let div=document.createElement("div");

div.className="order";

div.innerHTML=`

<h3>${o.name}</h3>

<p>Price : ₹${o.price}</p>

<p>Quantity : ${o.qty}</p>

<p>Total : ₹${o.total}</p>

`;

container.appendChild(div);

});

</script>

</body>
</html>
