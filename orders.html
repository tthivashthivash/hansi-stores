<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Orders</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.order-card{max-width:600px;margin:20px auto;padding:15px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.order-card h3{margin-bottom:10px;color:#333;}
.order-item{display:flex;justify-content:space-between;margin-bottom:8px;color:#555;}
button.cancel{padding:8px 12px;border:none;border-radius:20px;background:red;color:white;cursor:pointer;transition:0.3s;margin-top:10px;}
button.cancel:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h1>Your Orders</h1>
    <div id="ordersContainer"></div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ alert("Please login first."); redirect("index.html"); }

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ===== Load Orders =====
let orders = JSON.parse(localStorage.getItem("orders") || "[]");
let userOrders = orders.filter(o=>o.username===loggedInUser);
const ordersContainer = document.getElementById("ordersContainer");

function renderOrders(){
    ordersContainer.innerHTML="";
    if(userOrders.length===0){
        ordersContainer.innerHTML="<p>You have no orders yet.</p>";
        return;
    }
    userOrders.forEach((order,index)=>{
        const div = document.createElement("div");
        div.className="order-card";
        div.innerHTML=`<h3>Order #${index+1} | Date: ${order.date}</h3>`;
        let total=0;
        order.items.forEach(item=>{
            const product = products.find(p=>p.id===item.id);
            const itemTotal = product.price*item.quantity;
            total+=itemTotal;
            const itemDiv = document.createElement("div");
            itemDiv.className="order-item";
            itemDiv.innerHTML=`<span>${product.name} (x${item.quantity})</span> <span>₹${itemTotal}</span>`;
            div.appendChild(itemDiv);
        });
        const totalDiv = document.createElement("div");
        totalDiv.className="order-item";
        totalDiv.style.fontWeight="bold";
        totalDiv.innerHTML=`<span>Total</span> <span>₹${total}</span>`;
        div.appendChild(totalDiv);

        // Cancel Button
        const cancelBtn = document.createElement("button");
        cancelBtn.className="cancel";
        cancelBtn.innerText="Cancel Order";
        cancelBtn.onclick=()=>cancelOrder(order);
        div.appendChild(cancelBtn);

        ordersContainer.appendChild(div);
    });
}

function cancelOrder(order){
    orders = orders.filter(o=>o!==order);
    localStorage.setItem("orders",JSON.stringify(orders));
    userOrders = orders.filter(o=>o.username===loggedInUser);
    alert("Order cancelled!");
    renderOrders();
}

// ===== Initial Render =====
renderOrders();
</script>

</body>
</html>
