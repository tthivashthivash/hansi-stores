<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Hansi Store</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.checkout-container{max-width:500px;margin:30px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.checkout-container h2{margin-bottom:10px;}
.checkout-container p{margin:10px 0;font-size:18px;}
.checkout-container button{padding:10px 15px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;font-size:16px;transition:0.3s;}
.checkout-container button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <div class="checkout-container" id="checkoutContainer">
        <!-- Product info will load here -->
    </div>
</main>

<script>
// ===== Redirect Function =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ alert("Please login first."); redirect("index.html"); }

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ===== Get Selected Product =====
const selectedId = parseInt(localStorage.getItem("selectedProduct"));
const product = products.find(p=>p.id===selectedId);

const container = document.getElementById("checkoutContainer");

if(product){
    container.innerHTML = `
        <h2>Checkout</h2>
        <p><strong>Product:</strong> ${product.name}</p>
        <p><strong>Price:</strong> ₹${product.price}</p>
        <label>
            Quantity: <input type="number" id="qty" value="1" min="1" style="width:60px;">
        </label>
        <br><br>
        <button onclick="placeOrder()">Place Order</button>
    `;
}else{
    container.innerHTML = "<p>Product not found!</p>";
}

// ===== Place Order =====
function placeOrder(){
    const qty = parseInt(document.getElementById("qty").value);
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders.push({username:loggedInUser, productId:product.id, quantity:qty, date:new Date().toLocaleString()});
    localStorage.setItem("orders", JSON.stringify(orders));
    alert("Order placed successfully!");
    redirect("orders.html");
}
</script>

</body>
</html>
