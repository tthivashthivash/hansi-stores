```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store</title>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f8f8f8;
}

header.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,violet,skyblue);
color:white;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.logo{
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.nav-icons span{
margin-left:20px;
cursor:pointer;
font-weight:bold;
}

main{
padding:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.product-card{
background:white;
border-radius:15px;
padding:15px;
width:200px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
position:relative;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card h3{
margin:10px 0;
}

.product-card p{
margin:5px 0;
color:gray;
}

.product-card span{
font-weight:bold;
color:violet;
}

/* HEART STYLE */

.wishlist-btn{
position:absolute;
top:10px;
right:10px;
font-size:22px;
color:#bbb;
cursor:pointer;
transition:0.3s;
}

.wishlist-btn.active{
color:red;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo" onclick="redirect('home.html')">
Hansi Store
</div>

<div class="nav-icons">


<span onclick="redirect('wishlist.html')">❤️ Wishlist</span>

<span onclick="redirect('cart.html')">🛒 Cart</span>

<span onclick="redirect('orders.html')">📦 My Orders</span>

<span onclick="redirect('profile.html')">👤 Profile</span>

</div>

</header>

<main id="productsContainer"></main>

<script>

// redirect
function redirect(page){
window.location.href = page;
}

// login user
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

if(!loggedInUser){
alert("Please login first");
redirect("index.html");
}

// products
const products=[

{id:1,name:"Product A",price:499,description:"This is Product A description."},

{id:2,name:"Product B",price:799,description:"This is Product B description."},

{id:3,name:"Product C",price:299,description:"This is Product C description."},

{id:4,name:"Product D",price:999,description:"This is Product D description."}

];

// wishlist storage
let allWishlists = JSON.parse(localStorage.getItem("wishlist") || "{}");

if(!allWishlists[loggedInUser.username]){
allWishlists[loggedInUser.username] = [];
}

function saveWishlist(){
localStorage.setItem("wishlist",JSON.stringify(allWishlists));
}

// load products
const container=document.getElementById("productsContainer");

products.forEach(p=>{

const card=document.createElement("div");

card.className="product-card";

let userWishlist = allWishlists[loggedInUser.username];

card.innerHTML=`

<div class="wishlist-btn ${userWishlist.includes(p.id) ? 'active':''}">❤</div>

<h3>${p.name}</h3>

<p>Price: ₹<span>${p.price}</span></p>

<p>${p.description.substring(0,30)}...</p>

`;

const heart=card.querySelector(".wishlist-btn");

// toggle wishlist
heart.onclick=(e)=>{

e.stopPropagation();

let userWishlist = allWishlists[loggedInUser.username];

if(userWishlist.includes(p.id)){

allWishlists[loggedInUser.username] = userWishlist.filter(id=>id!==p.id);

heart.classList.remove("active");

}else{

userWishlist.push(p.id);

heart.classList.add("active");

}

saveWishlist();

};

// open product
card.onclick=()=>{

localStorage.setItem("selectedProduct",p.id);

redirect("product.html");

};

container.appendChild(card);

});

</script>

</body>
</html>
