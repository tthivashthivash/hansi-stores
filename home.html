<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.product-card{background:white;border-radius:15px;padding:15px;width:200px;box-shadow:0 3px 6px rgba(0,0,0,0.1);cursor:pointer;transition:0.3s;position:relative;}
.product-card:hover{transform:translateY(-5px);}
.product-card h3{margin:10px 0;}
.product-card p{margin:5px 0;color:gray;}
.product-card span{font-weight:bold;color:violet;}
.wishlist-btn{position:absolute;top:10px;right:10px;font-size:20px;color:gray;cursor:pointer;transition:0.3s;}
.wishlist-btn.active{color:red;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main id="productsContainer">
    <!-- Product cards will load here -->
</main>

<script>
// ===== Redirect Function =====
function redirect(page){ window.location.href = page; }

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499, description:"This is Product A description."},
    {id:2,name:"Product B",price:799, description:"This is Product B description."},
    {id:3,name:"Product C",price:299, description:"This is Product C description."},
    {id:4,name:"Product D",price:999, description:"This is Product D description."}
];

// ===== Load Product Cards =====
const container = document.getElementById("productsContainer");

// Load existing wishlist
let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");

function saveWishlist(){ localStorage.setItem("wishlist", JSON.stringify(wishlist)); }

products.forEach(p=>{
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
        <div class="wishlist-btn ${wishlist.includes(p.id) ? 'active':''}">❤️</div>
        <h3>${p.name}</h3>
        <p>Price: ₹<span>${p.price}</span></p>
        <p>${p.description.substring(0,30)}...</p>
    `;
    const wishlistBtn = card.querySelector(".wishlist-btn");

    // Wishlist toggle
    wishlistBtn.addEventListener("click", (e)=>{
        e.stopPropagation(); // prevent redirect to product page
        if(wishlist.includes(p.id)){
            wishlist = wishlist.filter(id=>id!==p.id);
            wishlistBtn.classList.remove("active");
        } else {
            wishlist.push(p.id);
            wishlistBtn.classList.add("active");
        }
        saveWishlist();
    });

    // Redirect to product page on card click
    card.addEventListener("click", ()=>{
        localStorage.setItem("selectedProduct", p.id);
        redirect("product.html");
    });

    container.appendChild(card);
});
</script>

</body>
</html>
