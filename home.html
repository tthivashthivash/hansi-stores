<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store</title>

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f8f8f8;
}

header.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,violet,skyblue);
color:white;
}

.logo{
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.nav-icons{
display:flex;
align-items:center;
}

.nav-icons span{
margin-left:20px;
cursor:pointer;
font-weight:bold;
}

#searchBox{
padding:6px;
border:none;
border-radius:6px;
margin-right:20px;
}

main{
padding:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.product-card{
background:white;
border-radius:15px;
padding:15px;
width:200px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
text-align:center;
}

.product-card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.wishlist-btn{
position:absolute;
top:10px;
right:10px;
font-size:22px;
color:#bbb;
cursor:pointer;
}

.wishlist-btn.active{
color:red;
}
</style>
</head>

<body>

<header class="navbar">

<div class="logo" onclick="redirect('home.html')">
Hansi Store
</div>

<div class="nav-icons">

<input type="text" id="searchBox" placeholder="Search product..." onkeyup="searchProduct()">

<span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
<span onclick="redirect('cart.html')">🛒 Cart</span>
<span onclick="redirect('orders.html')">📦 My Orders</span>
<span onclick="redirect('profile.html')">👤 Profile</span>

</div>

</header>

<main id="productsContainer"></main>

<script>

function redirect(page){
window.location.href=page;
}

// LOGIN CHECK
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

if(!loggedInUser){
alert("Please login first");
redirect("index.html");
}

// PRODUCTS WITH IMAGES
const products=[
{
id:1,
name:"Product A",
price:499,
description:"This is Product A",
image:"https://via.placeholder.com/200?text=Product+A"
},
{
id:2,
name:"Product B",
price:799,
description:"This is Product B",
image:"https://via.placeholder.com/200?text=Product+B"
},
{
id:3,
name:"Product C",
price:299,
description:"This is Product C",
image:"https://via.placeholder.com/200?text=Product+C"
},
{
id:4,
name:"Product D",
price:999,
description:"This is Product D",
image:"https://via.placeholder.com/200?text=Product+D"
}
];

// WISHLIST STORAGE
let allWishlists = JSON.parse(localStorage.getItem("wishlist") || "{}");

if(!allWishlists[loggedInUser.username]){
allWishlists[loggedInUser.username]=[];
}

function saveWishlist(){
localStorage.setItem("wishlist",JSON.stringify(allWishlists));
}

const container=document.getElementById("productsContainer");

products.forEach(p=>{

const card=document.createElement("div");
card.className="product-card";

let userWishlist=allWishlists[loggedInUser.username];

card.innerHTML=`

<div class="wishlist-btn ${userWishlist.includes(p.id)?'active':''}">❤</div>

<img src="${p.image}">

<h3>${p.name}</h3>

<p>Price: ₹${p.price}</p>
<p>${p.description}</p>

`;

const heart=card.querySelector(".wishlist-btn");

// HEART CLICK
heart.onclick=(e)=>{

e.stopPropagation();

let userWishlist=allWishlists[loggedInUser.username];

if(userWishlist.includes(p.id)){

allWishlists[loggedInUser.username]=userWishlist.filter(id=>id!==p.id);
heart.classList.remove("active");

}else{

userWishlist.push(p.id);
heart.classList.add("active");

}

saveWishlist();

};

// OPEN PRODUCT PAGE
card.onclick=()=>{
localStorage.setItem("selectedProduct",p.id);
redirect("product.html");
};

container.appendChild(card);

});

// SEARCH SYSTEM
function searchProduct(){

let input=document.getElementById("searchBox").value.toLowerCase();

let cards=document.querySelectorAll(".product-card");

cards.forEach(card=>{

let name=card.querySelector("h3").innerText.toLowerCase();

if(name.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
