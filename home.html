<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMeesho Home</title>
<style>
body{margin:0;font-family:Arial,sans-serif;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;}
header .search-bar{padding:5px 10px;border-radius:5px;border:none;}
main{padding:20px;}
footer{background:#f1f1f1;text-align:center;padding:20px;}
footer span{cursor:pointer;color:blue;text-decoration:underline;margin:0 5px;}
footer span:hover, header .nav-icons span:hover{opacity:0.8;}
.product-container{display:flex;flex-wrap:wrap;gap:20px;}
.product-card{border:1px solid #ccc;border-radius:10px;width:200px;padding:10px;text-align:center;position:relative;cursor:pointer;}
.product-card h3{margin:5px 0;}
.product-card p{margin:5px 0;}
.product-card .heart{position:absolute;top:10px;right:10px;font-size:20px;color:grey;cursor:pointer;}
.product-card .heart.active{color:red;}
.product-card button{padding:8px 12px;border:none;border-radius:5px;background:violet;color:white;cursor:pointer;transition:0.3s;margin-top:5px;}
.product-card button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">MiniMeesho</div>
    <input type="text" placeholder="Search products..." class="search-bar">
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h1>Welcome, <span id="userName"></span>!</h1>
    <div class="product-container" id="productContainer">
        <!-- Products will load here -->
    </div>
</main>

<footer>
    <p>MiniMeesho © 2026 | 
        <span onclick="redirect('about.html')">About</span> | 
        <span onclick="redirect('contact.html')">Contact</span> | 
        <span onclick="redirect('terms.html')">Terms</span>
    </p>
</footer>

<script>
// ====== Redirect ======
function redirect(page){
    window.location.href = page;
}

// ====== Logged-in Check ======
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}else{
    document.getElementById("userName").innerText = loggedInUser;
}

// ====== Dummy Products ======
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ====== Render Products ======
const container = document.getElementById("productContainer");
const wishlistData = JSON.parse(localStorage.getItem("wishlist") || "[]");
products.forEach(p=>{
    const div = document.createElement("div");
    div.className="product-card";
    // Check if in wishlist
    let userWishlist = wishlistData.find(w=>w.username===loggedInUser);
    let isFav = userWishlist && userWishlist.productIds.includes(p.id);
    div.innerHTML = `
        <div class="heart ${isFav?'active':''}" onclick="toggleWishlist(event,${p.id})">❤</div>
        <h3 onclick="viewProduct(${p.id})">${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
    `;
    container.appendChild(div);
});

// ====== Add to Cart ======
function addToCart(id){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    const exist = cart.find(item=>item.id===id);
    if(exist){
        exist.quantity += 1;
    }else{
        cart.push({id, quantity:1});
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}

// ====== Toggle Wishlist ======
function toggleWishlist(e, id){
    e.stopPropagation(); // prevent parent click
    let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");
    let userWishlist = wishlist.find(w=>w.username===loggedInUser);
    if(!userWishlist){
        userWishlist = {username:loggedInUser, productIds:[]};
        wishlist.push(userWishlist);
    }
    if(userWishlist.productIds.includes(id)){
        // remove from wishlist
        userWishlist.productIds = userWishlist.productIds.filter(pid=>pid!==id);
        e.target.classList.remove("active");
    }else{
        userWishlist.productIds.push(id);
        e.target.classList.add("active");
    }
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
}

// ====== Product Detail ======
function viewProduct(id){
    // Save product id in localStorage
    localStorage.setItem("selectedProduct", id);
    redirect("product.html"); // Redirect to product detail page
}
</script>

</body>
</html>
