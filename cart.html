<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f8f8f8;
}

header.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,violet,skyblue);
color:white;
}

.logo{
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.nav-icons span{
margin-left:20px;
cursor:pointer;
font-weight:bold;
}

main{
padding:20px;
max-width:900px;
margin:auto;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.cart-item button{
padding:5px 10px;
border:none;
border-radius:5px;
background:violet;
color:white;
cursor:pointer;
margin-left:5px;
}

.total-box{
text-align:center;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.checkout-btn{
display:block;
margin:20px auto;
padding:10px 20px;
border:none;
border-radius:20px;
background:green;
color:white;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<header class="navbar">

<div class="logo" onclick="redirect('home.html')">
Hansi Store
</div>

<div class="nav-icons">

<span onclick="redirect('home.html')">🏠 Home</span>
<span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
<span onclick="redirect('orders.html')">📦 My Orders</span>
<span onclick="redirect('profile.html')">👤 Profile</span>

</div>

</header>

<main>

<h2 style="text-align:center;">My Cart</h2>

<div id="cartContainer"></div>

<div class="total-box" id="totalPrice"></div>

<button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>

</main>

<script>

function redirect(page){
window.location.href=page;
}

// LOGIN CHECK
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){
alert("Please login first");
redirect("index.html");
}

// PRODUCTS
const products=[
{id:1,name:"Product A",price:499},
{id:2,name:"Product B",price:799},
{id:3,name:"Product C",price:299},
{id:4,name:"Product D",price:999}
];

// CART STORAGE
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

// RENDER CART
function renderCart(){

let container=document.getElementById("cartContainer");

container.innerHTML="";

let total=0;

if(cart.length===0){
container.innerHTML="<h3>Your cart is empty</h3>";
document.getElementById("totalPrice").innerText="";
return;
}

cart.forEach(item=>{

let product = products.find(p=>p.id===item.id);

let div=document.createElement("div");

div.className="cart-item";

div.innerHTML=`

<div>
<h3>${product.name}</h3>
<p>₹${product.price}</p>
</div>

<div>

<button onclick="decrease(${item.id})">-</button>

${item.quantity}

<button onclick="increase(${item.id})">+</button>

<button onclick="removeItem(${item.id})">Remove</button>

</div>

`;

container.appendChild(div);

total += product.price * item.quantity;

});

document.getElementById("totalPrice").innerText="Total: ₹"+total;

}

// INCREASE
function increase(id){

cart.forEach(item=>{
if(item.id===id){
item.quantity++;
}
});

saveCart();
renderCart();

}

// DECREASE
function decrease(id){

cart.forEach(item=>{
if(item.id===id && item.quantity>1){
item.quantity--;
}
});

saveCart();
renderCart();

}

// REMOVE
function removeItem(id){

cart = cart.filter(item=>item.id!==id);

saveCart();
renderCart();

}

// CHECKOUT
function checkout(){

if(cart.length===0){
alert("Cart empty");
return;
}

redirect("checkout.html");

}

renderCart();

</script>

</body>
</html>
