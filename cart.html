<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;max-width:800px;margin:auto;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:15px;background:white;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.cart-item span{font-weight:bold;}
.cart-item button{padding:5px 10px;border:none;border-radius:10px;background:violet;color:white;cursor:pointer;transition:0.3s;margin-left:5px;}
.cart-item button:hover{opacity:0.8;}
.total{margin-top:20px;font-size:20px;text-align:right;font-weight:bold;}
.checkout-btn{margin-top:15px;padding:10px 20px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;font-size:16px;float:right;}
.checkout-btn:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h2>My Cart</h2>
    <div id="cartContainer"></div>
    <div class="total" id="totalAmount"></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
let loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
} else {
    try{ loggedInUser = JSON.parse(loggedInUser).username || loggedInUser; } catch(e){}
}

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ===== Load Cart for Logged-in User =====
let allCarts = JSON.parse(localStorage.getItem("cart") || "{}");
let cart = allCarts[loggedInUser] || [];

const container = document.getElementById("cartContainer");
const totalDiv = document.getElementById("totalAmount");

function saveCart(){
    allCarts[loggedInUser] = cart;
    localStorage.setItem("cart", JSON.stringify(allCarts));
}

function loadCart(){
    container.innerHTML = "";
    let total = 0;
    if(cart.length===0){
        container.innerHTML = "<p>Your cart is empty!</p>";
        totalDiv.innerHTML = "";
        return;
    }
    cart.forEach(item=>{
        const product = products.find(p=>p.id===item.id);
        const itemTotal = product.price * item.quantity;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <span>${product.name} (₹${product.price}) x ${item.quantity} = ₹${itemTotal}</span>
            <div>
                <button onclick="changeQty(${item.id}, -1)">-</button>
                <button onclick="changeQty(${item.id}, 1)">+</button>
                <button onclick="removeItem(${item.id})">Remove</button>
            </div>
        `;
        container.appendChild(div);
    });
    totalDiv.innerHTML = `Total: ₹${total}`;
}

// ===== Cart Actions =====
function changeQty(id, delta){
    const index = cart.findIndex(item=>item.id===id);
    if(index>=0){
        cart[index].quantity += delta;
        if(cart[index].quantity <= 0) cart.splice(index,1);
        saveCart();
        loadCart();
    }
}

function removeItem(id){
    cart = cart.filter(item=>item.id!==id);
    saveCart();
    loadCart();
}

function checkout(){
    if(cart.length===0){
        alert("Cart is empty!");
        return;
    }
    // Save cart for checkout page
    localStorage.setItem("checkoutCart", JSON.stringify(cart));
    redirect("checkout.html");
}

// ===== Initial Load =====
loadCart();
</script>

</body>
</html>
