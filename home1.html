<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Home</title>
<style>
/* ===== Body & Fonts ===== */
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
h1,h2,h3,h4,p{margin:0;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
header .search-bar{padding:7px 12px;border-radius:20px;border:none;width:250px;}
main{padding:20px;}
footer{background:#f1f1f1;text-align:center;padding:20px;}
footer span{cursor:pointer;color:blue;text-decoration:underline;margin:0 5px;}
footer span:hover, header .nav-icons span:hover{opacity:0.8;}

/* ===== Product Cards ===== */
.product-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.product-card{border:1px solid #ccc;border-radius:15px;width:200px;padding:15px;text-align:center;position:relative;background:white;box-shadow:0 3px 6px rgba(0,0,0,0.1);transition:0.3s;cursor:pointer;}
.product-card:hover{transform:translateY(-5px);box-shadow:0 6px 12px rgba(0,0,0,0.2);}
.product-card h3{margin:10px 0;font-size:18px;color:#333;}
.product-card p{margin:5px 0;color:#555;font-weight:bold;}
.product-card .heart{position:absolute;top:10px;right:10px;font-size:20px;color:grey;cursor:pointer;transition:0.3s;}
.product-card .heart.active{color:red;}
.product-card button{padding:8px 12px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;transition:0.3s;margin-top:10px;}
.product-card button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <input type="text" placeholder="Search products..." class="search-bar">
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h1>Welcome, <span id="userName"></span>!</h1>
    <div class="product-container" id="productContainer">
        <!-- Products will load here -->
    </div>
</main>

<footer>
    <p>Hansi Store © 2026 | 
        <span onclick="redirect('about.html')">About</span> | 
        <span onclick="redirect('contact.html')">Contact</span> | 
        <span onclick="redirect('terms.html')">Terms</span>
    </p>
</footer>

<script>
// ===== Redirect Function =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ alert("Please login first."); redirect("index.html"); }
else{ document.getElementById("userName").innerText = loggedInUser; }

// ===== Dummy Products =====
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ===== Render Products =====
const container = document.getElementById("productContainer");
const wishlistData = JSON.parse(localStorage.getItem("wishlist") || "[]");
products.forEach(p=>{
    const div = document.createElement("div");
    div.className="product-card";
    // Wishlist check
    let userWishlist = wishlistData.find(w=>w.username===loggedInUser);
    let isFav = userWishlist && userWishlist.productIds.includes(p.id);
    div.innerHTML = `
        <div class="heart ${isFav?'active':''}" onclick="toggleWishlist(event,${p.id})">❤</div>
        <h3 onclick="viewProduct(${p.id})">${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(event,${p.id})">Add to Cart</button>
    `;
    container.appendChild(div);
});

// ===== Add to Cart =====
function addToCart(e,id){
    e.stopPropagation();
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    const exist = cart.find(item=>item.id===id);
    if(exist){ exist.quantity += 1; }
    else{ cart.push({id, quantity:1}); }
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}

// ===== Wishlist Toggle =====
function toggleWishlist(e, id){
    e.stopPropagation();
    let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");
    let userWishlist = wishlist.find(w=>w.username===loggedInUser);
    if(!userWishlist){ userWishlist = {username:loggedInUser, productIds:[]}; wishlist.push(userWishlist); }
    if(userWishlist.productIds.includes(id)){
        userWishlist.productIds = userWishlist.productIds.filter(pid=>pid!==id);
        e.target.classList.remove("active");
    }else{
        userWishlist.productIds.push(id);
        e.target.classList.add("active");
    }
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
}

// ===== Product Detail =====
function viewProduct(id){
    localStorage.setItem("selectedProduct", id);
    redirect("product.html");
}
</script>

</body>
</html>
