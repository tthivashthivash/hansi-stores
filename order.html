<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMeesho Orders</title>
<style>
body{margin:0;font-family:Arial,sans-serif;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;}
main{padding:20px;}
.order{border:1px solid #ccc;border-radius:10px;padding:15px;margin-bottom:20px;}
.order h3{margin:0 0 10px 0;}
.order-item{display:flex;justify-content:space-between;margin:5px 0;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">MiniMeesho</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h1>Your Orders</h1>
    <div id="ordersContainer"></div>
</main>

<script>
// ====== Redirect ======
function redirect(page){
    window.location.href = page;
}

// ====== Check Logged-in ======
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}

// ====== Products List ======
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// ====== Load Orders ======
const orders = JSON.parse(localStorage.getItem("orders") || "[]");
const userOrders = orders.filter(o=>o.username===loggedInUser);

const ordersContainer = document.getElementById("ordersContainer");

if(userOrders.length===0){
    ordersContainer.innerHTML="<p>No orders yet!</p>";
}else{
    userOrders.forEach((order,index)=>{
        const div = document.createElement("div");
        div.className="order";
        div.innerHTML = `<h3>Order #${index+1} | Date: ${order.date}</h3>`;
        let total=0;
        order.items.forEach(item=>{
            const product = products.find(p=>p.id===item.id);
            const itemTotal = product.price*item.quantity;
            total += itemTotal;
            const itemDiv = document.createElement("div");
            itemDiv.className="order-item";
            itemDiv.innerHTML = `<span>${product.name} (x${item.quantity})</span> <span>₹${itemTotal}</span>`;
            div.appendChild(itemDiv);
        });
        const totalDiv = document.createElement("div");
        totalDiv.className="order-item";
        totalDiv.style.fontWeight="bold";
        totalDiv.innerHTML = `<span>Total</span> <span>₹${total}</span>`;
        div.appendChild(totalDiv);

        ordersContainer.appendChild(div);
    });
}
</script>

</body>
</html>
