<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMeesho Profile</title>
<style>
body{margin:0;font-family:Arial,sans-serif;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;}
main{padding:20px;}
button{padding:10px 15px;border:none;border-radius:5px;background:violet;color:white;cursor:pointer;transition:0.3s;}
button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">MiniMeesho</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h1>Profile</h1>
    <p>Username: <span id="usernameDisplay"></span></p>
    <button onclick="logout()">Logout</button>
</main>

<script>
function redirect(page){ window.location.href = page; }

// ====== Check Logged-in ======
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}else{
    document.getElementById("usernameDisplay").innerText = loggedInUser;
}

// ====== Logout ======
function logout(){
    localStorage.removeItem("loggedInUser");
    alert("Logged out successfully!");
    redirect("index.html");
}
</script>

</body>
</html>
