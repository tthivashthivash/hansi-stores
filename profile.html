
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Profile</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.profile-card{max-width:400px;margin:40px auto;padding:25px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.profile-card h2{margin-bottom:20px;color:#333;}
.profile-card p{margin-bottom:10px;color:#555;font-size:16px;}
button.logout, button.settings, button.contact{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:violet;
    color:white;
    cursor:pointer;
    transition:0.3s;
    margin-right:10px;
}
button.logout:hover, button.settings:hover, button.contact:hover{opacity:0.8;}
button.settings{background:skyblue;}
button.contact{background:orange;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
    </div>
</header>

<main>
    <div class="profile-card">
        <h2>Profile</h2>
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Mobile:</strong> <span id="userMobile"></span></p>
        <p><strong>Address:</strong> <span id="userAddress"></span></p>

        <button class="settings" onclick="redirect('settings.html')">Settings</button>
        <button class="contact" onclick="redirect('contact.html')">Contact Support</button>
        <button class="logout" onclick="confirmLogout()">Logout</button>
    </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){ 
    alert("Please login first."); 
    redirect("index.html"); 
} else { 
    document.getElementById("userName").innerText = loggedInUser.name || "N/A";
    document.getElementById("userEmail").innerText = loggedInUser.email || "N/A";
    document.getElementById("userMobile").innerText = loggedInUser.mobile || "N/A";
    document.getElementById("userAddress").innerText = loggedInUser.address || "N/A";
}

// ===== Confirm Logout =====
function confirmLogout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.removeItem("loggedInUser");
        alert("Logged out successfully!");
        redirect("index.html");
    }
}
</script>

</body>
</html>
