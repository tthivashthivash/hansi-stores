<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Profile</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.profile-card{max-width:400px;margin:40px auto;padding:25px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.profile-card h2{margin-bottom:20px;color:#333;}
.profile-card p{margin-bottom:10px;color:#555;font-size:16px;}
button.logout, button.settings, button.contact, button.edit{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:violet;
    color:white;
    cursor:pointer;
    transition:0.3s;
    margin-right:10px;
}
button.logout:hover, button.settings:hover, button.contact:hover, button.edit:hover{opacity:0.8;}
button.settings{background:skyblue;}
button.contact{background:orange;}
button.edit{background:green;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
    </div>
</header>

<main>
    <div class="profile-card">
        <h2>Profile</h2>
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Mobile:</strong> <span id="userMobile"></span></p>
        <p><strong>Address:</strong> <span id="userAddress"></span></p>

        <button class="edit" onclick="editProfile()">Edit Profile</button>
        <button class="settings" onclick="redirect('settings.html')">Settings</button>
        <button class="contact" onclick="redirect('contact.html')">Contact Support</button>
        <button class="logout" onclick="confirmLogout()">Logout</button>
    </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){ 
    alert("Please login first."); 
    redirect("index.html"); 
} else { 
    // Fix: username → name
    document.getElementById("userName").innerText = loggedInUser.username || "N/A";
    document.getElementById("userEmail").innerText = loggedInUser.email || "N/A";
    document.getElementById("userMobile").innerText = loggedInUser.mobile || "N/A";
    document.getElementById("userAddress").innerText = loggedInUser.address || "N/A";
}

// ===== Confirm Logout =====
function confirmLogout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.removeItem("loggedInUser");
        alert("Logged out successfully!");
        redirect("index.html");
    }
}

// ===== Edit Profile =====
function editProfile(){
    const newName = prompt("Enter your Name:", loggedInUser.username);
    const newEmail = prompt("Enter your Email:", loggedInUser.email);
    const newMobile = prompt("Enter your Mobile Number:", loggedInUser.mobile);
    const newAddress = prompt("Enter your Address:", loggedInUser.address || "");

    if(newName && newEmail && newMobile){
        // Validate Mobile & Email
        if(!/^[0-9]{10}$/.test(newMobile)){
            alert("Enter valid 10-digit mobile number!");
            return;
        }
        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
            alert("Enter valid email!");
            return;
        }

        // Update localStorage
        loggedInUser.username = newName;
        loggedInUser.email = newEmail;
        loggedInUser.mobile = newMobile;
        loggedInUser.address = newAddress;

        // Update loggedInUser
        localStorage.setItem("loggedInUser", JSON.stringify(loggedInUser));

        // Also update in users array
        let users = JSON.parse(localStorage.getItem("users") || "[]");
        const idx = users.findIndex(u=>u.username===loggedInUser.username);
        if(idx!==-1){
            users[idx] = loggedInUser;
            localStorage.setItem("users", JSON.stringify(users));
        }

        // Refresh page
        alert("Profile updated successfully!");
        window.location.reload();
    }else{
        alert("All fields are required!");
    }
}
</script>

</body>
</html>
