<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Hansi Store</title>
<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f8f8f8;
}
header.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(135deg,violet,skyblue);
color:white;
}
.logo{
font-size:26px;
font-weight:bold;
cursor:pointer;
}
.nav-icons span{
margin-left:20px;
cursor:pointer;
font-weight:bold;
}
main{
padding:20px;
max-width:500px;
margin:40px auto;
background:white;
border-radius:15px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
text-align:center;
}
main h2{
margin-bottom:20px;
}
.main p{
margin:10px 0;
font-size:18px;
}
button{
margin-top:20px;
padding:10px 15px;
border:none;
border-radius:20px;
background:violet;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}
button:hover{
opacity:0.8;
}
</style>
</head>
<body>

<header class="navbar">
<div class="logo" onclick="redirect('home.html')">Hansi Store</div>
<div class="nav-icons">
<span onclick="redirect('home.html')">🏠 Home</span>
<span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
<span onclick="redirect('cart.html')">🛒 Cart</span>
<span onclick="redirect('orders.html')">📦 My Orders</span>
<span onclick="redirect('profile.html')">👤 Profile</span>
</div>
</header>

<main>
<h2>Your Profile</h2>
<p id="username"></p>
<p id="email"></p>
<p id="phone"></p>
<button onclick="logout()">Logout</button>
</main>

<script>
function redirect(page){
    window.location.href = page;
}

// Check login
let user = JSON.parse(localStorage.getItem("loggedInUser"));
if(!user){
    alert("Please login first.");
    redirect("index.html");
}

// Show details
document.getElementById("username").innerText = "Username: " + user.username;
document.getElementById("email").innerText = "Email: " + (user.email || "Not set");
document.getElementById("phone").innerText = "Phone: " + (user.phone || "Not set");

// Logout
function logout(){
    localStorage.removeItem("loggedInUser");
    alert("Logged out successfully!");
    redirect("index.html");
}
</script>

</body>
</html>
