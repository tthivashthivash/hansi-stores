<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Profile</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.profile-card{max-width:400px;margin:40px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.profile-card h2{margin-bottom:15px;color:#333;}
.profile-card p{margin-bottom:10px;color:#555;}
button.logout{padding:10px 15px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;transition:0.3s;}
button.logout:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
    </div>
</header>

<main>
    <div class="profile-card">
        <h2>Profile</h2>
        <p><strong>Username:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <button class="logout" onclick="confirmLogout()">Logout</button>
    </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){ 
    alert("Please login first."); 
    redirect("index.html"); 
} else { 
    document.getElementById("userName").innerText = loggedInUser; 
    // Fetch real email if stored
    const users = JSON.parse(localStorage.getItem("users") || "[]");
    const user = users.find(u => u.username === loggedInUser);
    if(user && user.email) document.getElementById("userEmail").innerText = user.email;
    else document.getElementById("userEmail").innerText = loggedInUser+"@hansistore.com";
}

// ===== Confirm Logout =====
function confirmLogout(){
    const yes = confirm("Are you sure you want to logout?");
    if(yes){
        localStorage.removeItem("loggedInUser");
        alert("Logged out successfully!");
        redirect("index.html");
    }
}
</script>

</body>
</html>
