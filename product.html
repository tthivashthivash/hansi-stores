<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#f8f8f8;
}

header{
background:linear-gradient(135deg,violet,skyblue);
padding:15px;
color:white;
display:flex;
justify-content:space-between;
}

.product{
background:white;
padding:20px;
margin:40px auto;
width:350px;
border-radius:10px;
text-align:center;
}

button{
padding:10px 15px;
background:violet;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
margin:5px;
}

</style>

</head>

<body>

<header>

<div>Hansi Store</div>

<div>

<span onclick="go('home.html')">🏠</span>
<span onclick="go('wishlist.html')">❤️</span>
<span onclick="go('cart.html')">🛒</span>
<span onclick="go('orders.html')">📦</span>

</div>

</header>

<div class="product" id="product"></div>

<script>

function go(page){
window.location.href=page;
}

const products=[

{id:1,name:"Product A",price:499,desc:"Nice product"},
{id:2,name:"Product B",price:799,desc:"Good product"},
{id:3,name:"Product C",price:299,desc:"Best product"},
{id:4,name:"Product D",price:999,desc:"Premium product"}

];

const id=parseInt(localStorage.getItem("selectedProduct"));

const product=products.find(p=>p.id===id);

const box=document.getElementById("product");

if(product){

box.innerHTML=`

<h2>${product.name}</h2>

<p>Price : ₹${product.price}</p>

<p>${product.desc}</p>

<button onclick="buy(${product.id})">Buy Now</button>

`;

}

function buy(id){

localStorage.setItem("buyProduct",id);

window.location.href="checkout.html";

}

</script>

</body>
</html>
