<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Support - Hansi Store</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.contact-card{max-width:500px;margin:40px auto;padding:25px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.contact-card h2{margin-bottom:20px;color:#333;}
.contact-card label{display:block;margin:10px 0;font-weight:bold;}
.contact-card input, .contact-card textarea{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-bottom:15px;resize:none;}
.contact-card button{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:orange;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.contact-card button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <div class="contact-card">
        <h2>Contact Support</h2>

        <label for="contactName">Name</label>
        <input type="text" id="contactName" placeholder="Enter your name">

        <label for="contactEmail">Email</label>
        <input type="email" id="contactEmail" placeholder="Enter your email">

        <label for="contactMessage">Message</label>
        <textarea id="contactMessage" rows="5" placeholder="Enter your message"></textarea>

        <button onclick="submitContact()">Send Message</button>
    </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}

// ===== Pre-fill Name & Email =====
document.getElementById("contactName").value = loggedInUser.name || "";
document.getElementById("contactEmail").value = loggedInUser.email || "";

// ===== Submit Contact =====
function submitContact(){
    const name = document.getElementById("contactName").value.trim();
    const email = document.getElementById("contactEmail").value.trim();
    const message = document.getElementById("contactMessage").value.trim();

    if(name==="" || email==="" || message===""){
        alert("Please fill all fields!");
        return;
    }

    // Save message in localStorage
    let contacts = JSON.parse(localStorage.getItem("contacts") || "[]");
    contacts.push({
        name,
        email,
        message,
        date: new Date().toLocaleString()
    });
    localStorage.setItem("contacts", JSON.stringify(contacts));

    alert("Your message has been sent. We will contact you soon!");
    
    // Clear message field
    document.getElementById("contactMessage").value = "";
}
</script>

</body>
</html>
