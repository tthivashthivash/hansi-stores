<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Settings</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.settings-card{max-width:500px;margin:40px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.settings-card h2{margin-bottom:20px;color:#333;}
.settings-card p{margin-bottom:15px;font-size:16px;color:#555;}
.settings-card label{display:block;margin:10px 0;font-weight:bold;}
.settings-card select, .settings-card input{padding:8px 12px;border-radius:10px;border:1px solid #ccc;width:100%;margin-bottom:15px;}
.settings-card button{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:violet;
    color:white;
    cursor:pointer;
    transition:0.3s;
    margin-right:10px;
}
.settings-card button:hover{opacity:0.8;}
.settings-card .secondary-btn{background:skyblue;}
hr{border:none;border-top:1px solid #eee;margin:20px 0;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <div class="settings-card">
        <h2>Settings</h2>

        <p><strong>Logged in as:</strong> <span id="userName"></span></p>

        <!-- Language Selection -->
        <label for="language">Language</label>
        <select id="language">
            <option value="en">English</option>
            <option value="ta">Tamil</option>
            <option value="hi">Hindi</option>
        </select>

        <!-- Buttons -->
        <button class="secondary-btn" onclick="redirect('wishlist.html')">View Wishlist</button>
        <button class="secondary-btn" onclick="redirect('contact.html')">Contact Support</button>

        <hr>

        <!-- Logout Button -->
        <button onclick="confirmLogout()">Logout</button>
    </div>
</main>

<script>
// ===== Redirect Function =====
function redirect(page){ window.location.href = page; }

// ===== Logged-in Check =====
const loggedInUser = localStorage.getItem("loggedInUser");
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}else{
    document.getElementById("userName").innerText = loggedInUser;
}

// ===== Logout Function =====
function confirmLogout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.removeItem("loggedInUser");
        alert("Logged out successfully!");
        redirect("index.html");
    }
}

// ===== Language Selection =====
const langSelect = document.getElementById("language");
// Load saved language
langSelect.value = localStorage.getItem("userLanguage") || "en";
// Save selection
langSelect.addEventListener("change", ()=>{
    localStorage.setItem("userLanguage", langSelect.value);
    alert("Language changed to " + langSelect.options[langSelect.selectedIndex].text);
});
</script>

</body>
</html>
