<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Settings</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
header .logo{font-size:24px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.settings-card{max-width:600px;margin:40px auto;padding:25px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.settings-card h2{margin-bottom:20px;color:#333;}
.settings-card p{margin-bottom:10px;font-size:16px;color:#555;}
.settings-card label{display:block;margin:10px 0;font-weight:bold;}
.settings-card input, .settings-card select{padding:8px 12px;border-radius:10px;border:1px solid #ccc;width:100%;margin-bottom:15px;}
.settings-card button{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:violet;
    color:white;
    cursor:pointer;
    transition:0.3s;
    margin-right:10px;
}
.settings-card button:hover{opacity:0.8;}
.settings-card .secondary-btn{background:skyblue;color:white;}
hr{border:none;border-top:1px solid #eee;margin:20px 0;}
.address-list{margin-bottom:15px;}
.address-list li{padding:5px 10px;background:#f2f2f2;border-radius:8px;margin-bottom:5px;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Hansi Store</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 My Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <div class="settings-card">
        <h2>Settings</h2>

        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Mobile:</strong> <span id="userMobile"></span></p>

        <p><strong>Addresses:</strong></p>
        <ul id="addressList" class="address-list"></ul>

        <hr>

        <!-- Change Mobile Number -->
        <label for="mobileInput">Change Mobile Number</label>
        <input type="text" id="mobileInput" placeholder="Enter new mobile number">
        <button onclick="changeMobile()">Update Mobile</button>

        <!-- Add New Address -->
        <label for="newAddressInput">Add New Address</label>
        <input type="text" id="newAddressInput" placeholder="Enter additional address">
        <button onclick="addAddress()">Add Address</button>

        <hr>

        <!-- Change Password -->
        <label for="currentPass">Current Password</label>
        <input type="password" id="currentPass" placeholder="Enter current password">
        <label for="newPass">New Password</label>
        <input type="password" id="newPass" placeholder="Enter new password">
        <button onclick="changePassword()">Update Password</button>

        <hr>

        <!-- Language Selection -->
        <label for="language">Language</label>
        <select id="language">
            <option value="en">English</option>
            <option value="ta">Tamil</option>
            <option value="hi">Hindi</option>
        </select>

        <hr>

        <!-- Quick Buttons -->
        <button class="secondary-btn" onclick="redirect('wishlist.html')">View Wishlist</button>
        <button class="secondary-btn" onclick="redirect('contact.html')">Contact Support</button>

        <hr>

        <!-- Logout -->
        <button onclick="confirmLogout()">Logout</button>
    </div>
</main>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Load Logged-in User =====
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){
    alert("Please login first.");
    redirect("index.html");
}

// ===== Display Info =====
document.getElementById("userName").innerText = loggedInUser.name || "N/A";
document.getElementById("userEmail").innerText = loggedInUser.email || "N/A";
document.getElementById("userMobile").innerText = loggedInUser.mobile || "N/A";

// Show all addresses
function renderAddresses(){
    const ul = document.getElementById("addressList");
    ul.innerHTML = "";
    const addresses = loggedInUser.addresses || [];
    if(addresses.length===0){
        ul.innerHTML = "<li>No addresses added yet.</li>";
    } else {
        addresses.forEach(addr=>{
            const li = document.createElement("li");
            li.innerText = addr;
            ul.appendChild(li);
        });
    }
}
renderAddresses();

// ===== Change Mobile =====
function changeMobile(){
    const mobile = document.getElementById("mobileInput").value.trim();
    if(mobile===""){ alert("Enter a valid mobile number!"); return; }
    loggedInUser.mobile = mobile;
    saveUser();
    document.getElementById("userMobile").innerText = mobile;
    alert("Mobile number updated!");
    document.getElementById("mobileInput").value = "";
}

// ===== Add Address =====
function addAddress(){
    const newAddr = document.getElementById("newAddressInput").value.trim();
    if(newAddr===""){ alert("Enter a valid address!"); return; }
    if(!loggedInUser.addresses) loggedInUser.addresses = [];
    loggedInUser.addresses.push(newAddr);
    saveUser();
    renderAddresses();
    alert("Address added!");
    document.getElementById("newAddressInput").value = "";
}

// ===== Change Password =====
function changePassword(){
    const current = document.getElementById("currentPass").value.trim();
    const newPass = document.getElementById("newPass").value.trim();
    if(!current || !newPass){ alert("Fill both password fields!"); return; }
    if(loggedInUser.password && loggedInUser.password!==current){ alert("Current password incorrect!"); return; }
    loggedInUser.password = newPass;
    saveUser();
    alert("Password updated!");
    document.getElementById("currentPass").value = "";
    document.getElementById("newPass").value = "";
}

// ===== Save User =====
function saveUser(){
    localStorage.setItem("loggedInUser", JSON.stringify(loggedInUser));
    // Also update in full users array for future login
    const users = JSON.parse(localStorage.getItem("users") || "[]");
    const index = users.findIndex(u=>u.username===loggedInUser.username);
    if(index!==-1){ users[index]=loggedInUser; localStorage.setItem("users", JSON.stringify(users)); }
}

// ===== Logout =====
function confirmLogout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.removeItem("loggedInUser");
        alert("Logged out successfully!");
        redirect("index.html");
    }
}

// ===== Language =====
const langSelect = document.getElementById("language");
langSelect.value = localStorage.getItem("userLanguage") || "en";
langSelect.addEventListener("change", ()=>{
    localStorage.setItem("userLanguage", langSelect.value);
    alert("Language changed to " + langSelect.options[langSelect.selectedIndex].text);
});
</script>

</body>
</html>
