<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMeesho Login / Signup</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:white;padding:30px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2);width:350px;}
h2{text-align:center;margin-bottom:20px;}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:10px;margin:10px 0;border:none;border-radius:5px;background:violet;color:white;font-size:16px;cursor:pointer;transition:0.3s;}
button:hover{opacity:0.8;}
.toggle{color:blue;cursor:pointer;text-align:center;margin-top:10px;text-decoration:underline;}
</style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Login</h2>
    <input type="text" id="username" placeholder="Enter username">
    <input type="password" id="password" placeholder="Enter password">
    <button id="submitBtn">Login</button>
    <div class="toggle" id="toggleForm">Don't have an account? Signup</div>
</div>

<script>
// ====== Redirect Function ======
function redirect(page){
    window.location.href = page;
}

// ====== Toggle Login / Signup ======
let isLogin = true;
const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");
const toggleForm = document.getElementById("toggleForm");

toggleForm.addEventListener("click",()=>{
    isLogin = !isLogin;
    if(isLogin){
        formTitle.innerText="Login";
        submitBtn.innerText="Login";
        toggleForm.innerText="Don't have an account? Signup";
    }else{
        formTitle.innerText="Signup";
        submitBtn.innerText="Signup";
        toggleForm.innerText="Already have an account? Login";
    }
});

// ====== Submit Login / Signup ======
submitBtn.addEventListener("click",()=>{
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if(username==="" || password===""){
        alert("Please enter both fields!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    if(isLogin){
        // Login
        const user = users.find(u=>u.username===username && u.password===password);
        if(user){
            localStorage.setItem("loggedInUser", username);
            alert("Login Successful!");
            redirect("home.html"); // ✅ Correct redirect to Home page
        }else{
            alert("Invalid username or password!");
        }
    }else{
        // Signup
        const exist = users.find(u=>u.username===username);
        if(exist){
            alert("Username already exists!");
            return;
        }
        users.push({username,password});
        localStorage.setItem("users", JSON.stringify(users));
        alert("Signup Successful! Please login.");
        // Switch to login
        isLogin = true;
        formTitle.innerText="Login";
        submitBtn.innerText="Login";
        toggleForm.innerText="Don't have an account? Signup";
    }
});
</script>

</body>
</html>
