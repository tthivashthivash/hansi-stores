<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hansi Store Login / Signup</title>
<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container {
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    width:360px;
}
h2 {
    text-align:center;
    margin-bottom:20px;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
button {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    background:violet;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    opacity:0.8;
}
.toggle {
    color:blue;
    cursor:pointer;
    text-align:center;
    margin-top:10px;
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Login</h2>
    <input type="text" id="mobile" placeholder="Mobile Number" style="display:none;">
    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email" style="display:none;">
    <input type="password" id="password" placeholder="Password">
    <button id="submitBtn">Login</button>
    <div class="toggle" id="toggleForm">Don't have an account? Signup</div>
</div>

<script>
// ===== Redirect =====
function redirect(page){ window.location.href = page; }

// ===== Validation =====
function isValidMobile(mobile){ return /^[0-9]{10}$/.test(mobile); }
function isValidEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

// ===== Toggle Login / Signup =====
let isLogin = true;
const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");
const toggleForm = document.getElementById("toggleForm");
const mobileInput = document.getElementById("mobile");
const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

toggleForm.addEventListener("click", ()=>{
    isLogin = !isLogin;
    if(isLogin){
        formTitle.innerText="Login";
        submitBtn.innerText="Login";
        toggleForm.innerText="Don't have an account? Signup";
        mobileInput.style.display="none";
        emailInput.style.display="none";
    }else{
        formTitle.innerText="Signup";
        submitBtn.innerText="Signup";
        toggleForm.innerText="Already have an account? Login";
        mobileInput.style.display="block";
        emailInput.style.display="block";
    }
});

// ===== Submit Login / Signup =====
submitBtn.addEventListener("click", ()=>{
    const mobile = mobileInput.value.trim();
    const username = usernameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    if(isLogin){
        // LOGIN
        if(username === "" || password === ""){
            alert("Enter username and password to login!");
            return;
        }
        const user = users.find(u=>u.username===username && u.password===password);
        if(user){
            localStorage.setItem("loggedInUser", JSON.stringify(user)); // full user save
            alert("Login Successful!");
            redirect("profile.html");
        }else{
            alert("Invalid credentials!");
        }
    }else{
        // SIGNUP
        if(mobile==="" || username==="" || email==="" || password===""){
            alert("All fields are required!");
            return;
        }
        if(!isValidMobile(mobile)){
            alert("Enter a valid 10-digit mobile number!");
            return;
        }
        if(!isValidEmail(email)){
            alert("Enter a valid email!");
            return;
        }
        const exist = users.find(u=>u.username===username);
        if(exist){
            alert("Username already exists!");
            return;
        }
        // Save user
        const newUser = {mobile, username, email, password};
        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("loggedInUser", JSON.stringify(newUser)); // auto login
        alert("Signup Successful! Redirecting to Profile...");
        setTimeout(()=>{ redirect("profile.html"); }, 100);
    }
});
</script>

</body>
</html>
